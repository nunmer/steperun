app = "app-wild-dream-1355"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://ddohlplxshswvbittecv.supabase.co"
    # Set NEXT_PUBLIC_SUPABASE_ANON_KEY via: fly deploy --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
